<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduConecta | Contacto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <h1 class="logo">EduConecta</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="apuntes.html">Apuntes</a></li>
          <li><a href="tutorias.html">Tutorías</a></li>
          <li><a href="cursos.html">Cursos</a></li>
          <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
      </nav>
      <button id="menu-toggle" class="menu-toggle">☰</button>
    </div>
  </header>

  <main class="page-main">
    <section class="page-banner">
      <div class="container">
        <h2>Contáctanos</h2>
        <p>Déjanos tus datos y pronto nos comunicaremos contigo.</p>
      </div>
    </section>

    <section class="section">
      <div class="container contact-grid">
        <div class="info-box">
          <h3>Información</h3>
          <p><strong>Correo:</strong> contacto@educonecta.com</p>
          <p><strong>Teléfono:</strong> 222 000 0000</p>
          <p><strong>Horario:</strong> Lunes a Viernes, 9:00 a 18:00</p>
        </div>

        <form id="contact-form" class="contact-form">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required />

          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required />

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí" required></textarea>

          <button type="submit" class="btn primary full">Enviar mensaje</button>
          <p id="form-message" class="form-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 EduConecta | Portal de ayuda estudiantil</p>
    </div>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
